<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>UNIT</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0a0a0a; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    .wrap {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
    }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: 0.04em; }
    .logo span { color: #0088ff; }
    .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid #1a1a1a; border-top-color: #0088ff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { color: #666; font-size: 0.85rem; letter-spacing: 0.08em; }
    .retry {
      display: none; margin-top: 8px; padding: 12px 24px;
      background: #0088ff; color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">UNIT<span>.</span></div>
    <div class="spinner" id="spin"></div>
    <div class="msg" id="msg">LOADING</div>
    <button class="retry" id="retry" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
