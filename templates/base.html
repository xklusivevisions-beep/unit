<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a;">
<head>
<meta charset="UTF-8">
<style>html,body{background:#0a0a0a !important;}</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>{% block title %}UNIT{% endblock %}</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UNIT">
<meta name="format-detection" content="telephone=no">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-overflow-scrolling: touch;
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  .unit-logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #00ff88;
  }
  .unit-logo span { color: #ffffff; }
  .card {
    background: #111111;
    border: 1px solid #222222;
    border-radius: 16px;
  }
  .btn-primary {
    background: #00ff88;
    border: none;
    color: #000;
    font-weight: 700;
    border-radius: 12px;
    padding: 12px 24px;
  }
  .btn-primary:hover { background: #00dd77; color: #000; }
  .btn-danger {
    background: #ff3333;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
  }
  .btn-outline-light {
    border-radius: 12px;
    padding: 10px 20px;
  }
  .form-control, .form-select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    border-radius: 12px;
    padding: 12px 16px;
  }
  .form-control:focus, .form-select:focus {
    background: #1a1a1a;
    border-color: #00ff88;
    color: #fff;
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }
  .badge-success { background: #00ff88; color: #000; }
  .stat-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-number {
    font-size: 2.5rem;
    font-weight: 900;
    color: #00ff88;
  }
  .access-box {
    background: #0d2818;
    border: 2px solid #00ff88;
    border-radius: 16px;
    padding: 20px;
  }
  .warning-box {
    background: #1a1000;
    border: 2px solid #ffaa00;
    border-radius: 16px;
    padding: 20px;
  }
  .nav-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #222;
    padding: 12px 0 calc(20px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-bottom a {
    color: #666;
    text-decoration: none;
    font-size: 0.7rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .nav-bottom a.active, .nav-bottom a:hover { color: #00ff88; }
  .nav-bottom i { font-size: 1.3rem; }
  .pb-nav { padding-bottom: 80px; }
  .status-pill {
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .pill-delivered { background: #00ff8822; color: #00ff88; }
  .pill-failed { background: #ff333322; color: #ff3333; }
  .pill-pending { background: #ffaa0022; color: #ffaa00; }
  .pill-arrived { background: #0088ff22; color: #0088ff; }
  label { color: #aaa; font-size: 0.85rem; margin-bottom: 4px; }

  /* ── MOBILE RESPONSIVENESS ── */
  @media (max-width: 768px) {
    body { font-size: 16px; }

    /* Prevent iOS auto-zoom on inputs */
    .form-control, .form-select, input, select, textarea {
      font-size: 16px !important;
      padding: 14px 16px !important;
      min-height: 50px;
    }

    /* Bigger touch targets for buttons */
    .btn { min-height: 48px; font-size: 1rem !important; }
    .btn-sm { min-height: 36px; }

    /* Readable text — no tiny fonts on mobile */
    small, .small { font-size: 0.85rem !important; }
    .text-secondary { font-size: 0.85rem; }

    /* Stat numbers readable in col-4 */
    .stat-number { font-size: 1.8rem !important; }
    .stat-card { padding: 14px 8px !important; }
    .stat-card small { font-size: 0.7rem !important; }

    /* Cards breathe more */
    .card { padding: 16px !important; margin-bottom: 12px; }

    /* Bottom nav bigger tap area */
    .nav-bottom { padding: 14px 0 24px; }
    .nav-bottom a { font-size: 0.75rem; gap: 5px; }
    .nav-bottom i { font-size: 1.5rem; }

    /* Status pills readable */
    .status-pill { font-size: 0.75rem !important; padding: 5px 12px !important; }

    /* Logo sizing */
    .unit-logo { font-size: 1.6rem !important; }

    /* Access code big and clear */
    .access-code-display { font-size: 3rem !important; letter-spacing: 0.3em !important; }

    /* Address suggestion list — touch friendly */
    #address-suggestions li { padding: 14px 16px !important; font-size: 0.9rem !important; min-height: 48px; display: flex; align-items: center; }

    /* Tracking link code wrap */
    code { font-size: 0.8rem !important; word-break: break-all; }

    /* GPS status text */
    #gps-text { font-size: 0.9rem !important; }

    /* Delivered/Failed buttons full width on mobile already, make taller */
    .row.g-3 .btn { min-height: 56px; font-size: 1rem !important; }

    /* Container padding */
    .container-fluid { padding: 16px !important; }

    /* pb-nav increase for safe area */
    .pb-nav { padding-bottom: 100px !important; }
  }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/unit-native.js"></script>
{% block extra_js %}{% endblock %}
{% block scripts %}{% endblock %}
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
