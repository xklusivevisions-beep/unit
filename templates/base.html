<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}UNIT{% endblock %}</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#00ff88">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UNIT">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #ffffff;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  .unit-logo {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #00ff88;
  }
  .unit-logo span { color: #ffffff; }
  .card {
    background: #111111;
    border: 1px solid #222222;
    border-radius: 16px;
  }
  .btn-primary {
    background: #00ff88;
    border: none;
    color: #000;
    font-weight: 700;
    border-radius: 12px;
    padding: 12px 24px;
  }
  .btn-primary:hover { background: #00dd77; color: #000; }
  .btn-danger {
    background: #ff3333;
    border: none;
    border-radius: 12px;
    padding: 12px 24px;
  }
  .btn-outline-light {
    border-radius: 12px;
    padding: 10px 20px;
  }
  .form-control, .form-select {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    border-radius: 12px;
    padding: 12px 16px;
  }
  .form-control:focus, .form-select:focus {
    background: #1a1a1a;
    border-color: #00ff88;
    color: #fff;
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }
  .badge-success { background: #00ff88; color: #000; }
  .stat-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-number {
    font-size: 2.5rem;
    font-weight: 900;
    color: #00ff88;
  }
  .access-box {
    background: #0d2818;
    border: 2px solid #00ff88;
    border-radius: 16px;
    padding: 20px;
  }
  .warning-box {
    background: #1a1000;
    border: 2px solid #ffaa00;
    border-radius: 16px;
    padding: 20px;
  }
  .nav-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    border-top: 1px solid #222;
    padding: 12px 0 20px;
    z-index: 100;
  }
  .nav-bottom a {
    color: #666;
    text-decoration: none;
    font-size: 0.7rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .nav-bottom a.active, .nav-bottom a:hover { color: #00ff88; }
  .nav-bottom i { font-size: 1.3rem; }
  .pb-nav { padding-bottom: 80px; }
  .status-pill {
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .pill-delivered { background: #00ff8822; color: #00ff88; }
  .pill-failed { background: #ff333322; color: #ff3333; }
  .pill-pending { background: #ffaa0022; color: #ffaa00; }
  .pill-arrived { background: #0088ff22; color: #0088ff; }
  label { color: #aaa; font-size: 0.85rem; margin-bottom: 4px; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
