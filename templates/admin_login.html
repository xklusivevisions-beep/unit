{% extends 'base.html' %}
{% block title %}UNIT — Admin{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
  <div class="w-100" style="max-width:380px;">
    <div class="text-center mb-5">
      <div class="unit-logo mb-2">UNIT<span>.</span></div>
      <p class="text-secondary mb-0" style="letter-spacing:0.1em;font-size:0.85rem;">ADMIN ACCESS</p>
    </div>
    <div class="card p-4">
      <h5 class="fw-bold mb-4 text-center">Enter Admin PIN</h5>
      {% if error %}
      <div class="alert alert-danger border-0 rounded-3 mb-3">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="mb-4">
          <input type="password" name="pin" class="form-control text-center fs-3 fw-bold"
                 placeholder="••••" autofocus>
        </div>
        <button class="btn btn-primary w-100 fs-6">
          <i class="fas fa-unlock me-2"></i>Access Admin
        </button>
      </form>
    </div>
    <div class="text-center mt-4">
      <a href="/" class="text-decoration-none" style="color:#555;font-size:0.85rem;">← Back</a>
    </div>
  </div>
</div>
{% endblock %}
