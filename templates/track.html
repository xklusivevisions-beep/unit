<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIT — Track Your Driver</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  #map { width:100%; height:60vh; }
  .info-panel {
    padding: 20px;
    background: #111;
    border-top: 2px solid #00ff88;
  }
  .unit-logo { font-size:1.2rem; font-weight:900; letter-spacing:0.3em; color:#00ff88; }
  .unit-logo span { color:#fff; }
  .status-badge {
    display:inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.8rem;
  }
  .badge-enroute  { background:#0088ff22; color:#0088ff; }
  .badge-arrived  { background:#ffaa0022; color:#ffaa00; }
  .badge-delivered{ background:#00ff8822; color:#00ff88; }
  .badge-failed   { background:#ff333322; color:#ff3333; }
  .distance-display {
    font-size: 2.5rem;
    font-weight: 900;
    color: #00ff88;
  }
  .pulse {
    display:inline-block;
    width:10px; height:10px;
    border-radius:50%;
    background:#00ff88;
    animation: pulse 1.5s infinite;
    margin-right:8px;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); }
    70%  { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="info-panel">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="unit-logo">UNIT<span>.</span></div>
    <span id="status-badge" class="status-badge badge-enroute">EN ROUTE</span>
  </div>

  <div class="mb-3">
    <small style="color:#aaa;letter-spacing:0.1em;font-size:0.7rem;">DELIVERING TO</small>
    <div style="font-weight:700;">{{ delivery.address }}</div>
    {% if delivery.unit %}<div style="color:#aaa;">Unit {{ delivery.unit }}</div>{% endif %}
  </div>

  <div class="mb-3">
    <small style="color:#aaa;letter-spacing:0.1em;font-size:0.7rem;">DISTANCE AWAY</small>
    <div>
      <span class="pulse"></span>
      <span class="distance-display" id="distance">—</span>
      <span style="color:#aaa;"> miles</span>
    </div>
  </div>

  <div id="delivered-msg" style="display:none;background:#0d2818;border:2px solid #00ff88;border-radius:16px;padding:16px;text-align:center;margin-top:12px;">
    <div style="font-size:2rem;">📦</div>
    <div style="color:#00ff88;font-weight:900;font-size:1.2rem;">Package Delivered!</div>
    <small style="color:#aaa;">Your package has been left at your door</small>
  </div>
  <div id="failed-msg" style="display:none;background:#1a0000;border:2px solid #ff3333;border-radius:16px;padding:16px;text-align:center;margin-top:12px;">
    <div style="font-size:2rem;">⚠️</div>
    <div style="color:#ff3333;font-weight:900;font-size:1.2rem;">Delivery Attempted</div>
    <small style="color:#aaa;">Driver couldn't complete delivery — contact your carrier</small>
  </div>

  <div style="text-align:center;margin-top:16px;">
    <small style="color:#444;">Updates every 5 seconds</small>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DELIVERY_ID = {{ delivery.id }};
const DEST_LAT = {{ delivery.dest_lat or 42.3314 }};
const DEST_LNG = {{ delivery.dest_lng or -83.0458 }};

// Init map centered on destination
const map = L.map('map').setView([DEST_LAT, DEST_LNG], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Destination marker
const destIcon = L.divIcon({
  html: `<div style="background:#00ff88;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 10px #00ff88;"></div>`,
  iconSize: [20, 20], iconAnchor: [10, 10]
});
const destMarker = L.marker([DEST_LAT, DEST_LNG], {icon: destIcon}).addTo(map);
destMarker.bindPopup('📦 Your delivery address').openPopup();

// Driver marker (starts hidden)
const driverIcon = L.divIcon({
  html: `<div style="background:#0088ff;width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 15px #0088ff;display:flex;align-items:center;justify-content:center;">🚗</div>`,
  iconSize: [24, 24], iconAnchor: [12, 12]
});
let driverMarker = null;
let routeLine = null;

function updateMap(data) {
  if (!data.driver_lat || !data.driver_lng) return;

  const dPos = [data.driver_lat, data.driver_lng];

  if (!driverMarker) {
    driverMarker = L.marker(dPos, {icon: driverIcon}).addTo(map);
    driverMarker.bindPopup('🚗 Your driver');
  } else {
    driverMarker.setLatLng(dPos);
  }

  // Draw line between driver and destination
  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline([dPos, [DEST_LAT, DEST_LNG]], {
    color: '#00ff88', weight: 3, opacity: 0.6, dashArray: '8, 8'
  }).addTo(map);

  // Fit both markers in view
  map.fitBounds([[data.driver_lat, data.driver_lng], [DEST_LAT, DEST_LNG]], {padding: [40, 40]});

  // Update distance
  if (data.distance_miles !== null) {
    document.getElementById('distance').textContent = data.distance_miles.toFixed(1);
  }

  // Update status
  const badge = document.getElementById('status-badge');
  const statuses = {
    'en_route':  ['EN ROUTE',  'badge-enroute'],
    'arrived':   ['ARRIVED',   'badge-arrived'],
    'delivered': ['DELIVERED', 'badge-delivered'],
    'failed':    ['ATTEMPTED', 'badge-failed'],
    'pending':   ['EN ROUTE',  'badge-enroute'],
  };
  const [label, cls] = statuses[data.status] || ['EN ROUTE', 'badge-enroute'];
  badge.textContent = label;
  badge.className = 'status-badge ' + cls;

  // Show delivered/failed banners but keep map visible
  if (data.status === 'delivered') {
    document.getElementById('delivered-msg').style.display = 'block';
    document.getElementById('failed-msg').style.display = 'none';
  } else if (data.status === 'failed') {
    document.getElementById('failed-msg').style.display = 'block';
    document.getElementById('delivered-msg').style.display = 'none';
  }
}

async function poll() {
  try {
    const resp = await fetch(`/api/track/${DELIVERY_ID}`);
    const data = await resp.json();
    updateMap(data);
  } catch(e) {}
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
