databases:
  - name: unit-db
    plan: starter
    region: oregon

services:
  - type: web
    name: unit
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 4 --worker-class sync --timeout 120 --bind 0.0.0.0:$PORT --max-requests 1000 --max-requests-jitter 100
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: unit-db
          property: connectionString
      - key: ADMIN_PIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: TEXTBELT_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
